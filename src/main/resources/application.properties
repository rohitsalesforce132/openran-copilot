# OpenRAN Copilot Configuration

# Quarkus Configuration
quarkus.application.name=openran-copilot
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
openai.chat.model=gpt-4o
openai.embedding.model=text-embedding-3-small

# RAG Configuration
rag.top-k.default=5
rag.chunk.max-tokens=512
rag.chunk.overlap-tokens=50
rag.min-similarity=0.3

# Vector Store Configuration
vector-store.type=memory
vector-store.dimension=1536

# Knowledge Base Configuration
knowledge-base.specs-path=${HOME}/.openran-copilot/specs

# xApp Generation Configuration
xappgen.template-path=${HOME}/.openran-copilot/templates

# Troubleshooting Configuration
troubleshoot.max-diagnoses=5
troubleshoot.confidence.threshold=0.5

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."com.openran.copilot".level=INFO
quarkus.log.category."dev.langchain4j".level=WARN

# OpenAPI Configuration
quarkus.smallrye-openapi.path=/api/openapi
quarkus.smallrye-openapi.info-title=OpenRAN Copilot API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=AI Copilot for O-RAN Engineers - RAG over O-RAN specifications with xApp code generation

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*

# Health Configuration
quarkus.health.enabled=true
quarkus.health.liveness.enabled=true
quarkus.health.readiness.enabled=true
